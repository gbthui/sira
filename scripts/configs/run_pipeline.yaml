defaults:
  - global
  - data: scifact
  - bm25: default
  - enrich: default
  - greprag: default
  - iterative: default
  - rerank: default
  - sglang: "qwen3.6-35b-a3b-fp8:h100"
  - _self_

stages: [prepare, bm25, enrich_corpus, enrich_query, rerank]
datasets: null  # null = single dataset from data.name; list for multi-dataset

expansion_weight: 0.5
skip_existing: false

server:
  wait_timeout: 900

hydra:
  output_subdir: null
  run:
    dir: .
  job_logging:
    handlers:
      file:
        filename: /dev/null
